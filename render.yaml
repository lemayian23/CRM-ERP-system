services:
  - type: web
    name: aquashine-crm
    runtime: python
    repo: https://github.com/YOUR_USERNAME/aquashine-python
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: aquashine-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: aquashine-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: aquashine-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: aquashine-db
          property: database
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

databases:
  - name: aquashine-db
    plan: free