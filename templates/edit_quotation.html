{% extends "base.html" %}

{% block title %}Edit Quotation{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h4><i class="fas fa-edit me-2"></i>Edit Quotation</h4>
        <p class="text-muted mb-0">{{ quote.quote_number }}</p>
    </div>
    <a href="/quotations" class="btn btn-secondary">Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="/quotations/edit/{{ quote.quote_id }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Customer Name</label>
                    <input type="text" name="customer_name" class="form-control" value="{{ quote.customer_name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Customer Email</label>
                    <input type="email" name="customer_email" class="form-control" value="{{ quote.customer_email or '' }}">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Customer Phone</label>
                    <input type="text" name="customer_phone" class="form-control" value="{{ quote.customer_phone or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label>Status</label>
                    <select name="status" class="form-control">
                        <option value="draft" {% if quote.status == 'draft' %}selected{% endif %}>Draft</option>
                        <option value="sent" {% if quote.status == 'sent' %}selected{% endif %}>Sent</option>
                        <option value="approved" {% if quote.status == 'approved' %}selected{% endif %}>Approved</option>
                        <option value="rejected" {% if quote.status == 'rejected' %}selected{% endif %}>Rejected</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Quote Date</label>
                    <input type="date" name="quote_date" class="form-control" value="{{ quote.quote_date or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label>Expiry Date</label>
                    <input type="date" name="expiry_date" class="form-control" value="{{ quote.expiry_date or '' }}">
                </div>
            </div>
            
            <div class="mb-3">
                <label>Notes</label>
                <textarea name="notes" class="form-control" rows="3">{{ quote.notes or '' }}</textarea>
            </div>
            
            <div class="mb-3">
                <label>Terms & Conditions</label>
                <textarea name="terms_conditions" class="form-control" rows="3">{{ quote.terms_conditions or '' }}</textarea>
            </div>
            
            <div class="text-end">
                <button type="submit" class="btn btn-primary">Update Quotation</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
