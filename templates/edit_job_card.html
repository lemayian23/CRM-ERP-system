{% extends "base.html" %}

{% block title %}Edit Job Card{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h4><i class="fas fa-edit me-2"></i>Edit Job Card</h4>
        <p class="text-muted mb-0">Edit Job Card #{{ job_card.id }}</p>
    </div>
    <a href="/job-cards" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-1"></i>Back to List
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="/job-cards/{{ job_card.id }}/edit">
            <div class="mb-3">
                <label class="form-label">Customer Name</label>
                <input type="text" name="customer_name" class="form-control" value="{{ job_card.customer_name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Amount (KES)</label>
                <input type="number" step="0.01" name="amount" class="form-control" value="{{ job_card.amount }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Work Statement</label>
                <textarea name="work_statement" class="form-control" rows="4">{{ job_card.work_statement or '' }}</textarea>
            </div>
            <hr>
            <div class="text-end">
                <button type="submit" class="btn btn-primary">Update Job Card</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
