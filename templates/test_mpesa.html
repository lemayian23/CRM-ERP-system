<!DOCTYPE html>
<html>
<head>
    <title>Test M-Pesa STK Push</title>
    <style>
        body { font-family: Arial; margin: 50px; }
        input, button { padding: 8px; margin: 5px; }
        .result { margin-top: 20px; white-space: pre-wrap; background: #f4f4f4; padding: 10px; }
    </style>
</head>
<body>
    <h2>Test STK Push</h2>
    <form id="stkForm">
        <label>Phone (e.g., 0799801096):</label><br>
        <input type="text" id="phone" value="0799801096"><br>
        <label>Amount (KES):</label><br>
        <input type="number" id="amount" value="10"><br>
        <label>Job Card ID:</label><br>
        <input type="number" id="jobCardId" value="1"><br><br>
        <button type="submit">Send STK Push</button>
    </form>
    <div class="result" id="result"></div>

    <script>
        document.getElementById('stkForm').onsubmit = async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const amount = document.getElementById('amount').value;
            const jobCardId = document.getElementById('jobCardId').value;

            const response = await fetch('/api/mpesa/initiate-payment', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    job_card_id: jobCardId,
                    phone_number: phone,
                    amount: amount
                })
            });
            const data = await response.json();
            document.getElementById('result').innerText = JSON.stringify(data, null, 2);
        };
    </script>
</body>
</html>
